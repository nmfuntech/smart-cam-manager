<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="blackframe-csrf-token" content="{{ csrf_token }}" />
    <title>{% block title %}BLACKFRAME{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css', v=static_asset_version) }}"
    />
    {% block head_extra %}{% endblock %}
  </head>
  <body {% block body_attrs %}{% endblock %}>
    {% block header %}{% include "_nav.html" %}{% endblock %}
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
  </body>
</html>
