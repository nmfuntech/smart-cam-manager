# Regole automazione smart home — BLACKFRAME
#
# Formato:
#   name:     id unico della regola (usato nei log)
#   on:       evento che la attiva (person_detected | animal_detected | motion_detected)
#   between:  [inizio, fine] orario 24h — opzionale, supporta wrap notturno
#   do:       lista azioni da eseguire
#     - device:  nome logico (deve esistere in data/tuya_devices.json)
#       action:  turn_on | turn_off | set_state
#       for:     auto-off dopo N secondi/minuti/ore (es. 5m) — opzionale
#   cooldown: debounce per-regola (es. 120s) — opzionale

# Esempio: persona rilevata di notte → accende la lampada scrivania 1 per 5 minuti.
# Decommentare e adattare ai propri device e orari.
#
# - name: luce_ingresso_persona_notturna
#   on: person_detected
#   between: ["20:00", "07:00"]
#   do:
#     - device: luce_scrivania_1
#       action: turn_on
#       for: 5m
#   cooldown: 120s

# Esempio: qualsiasi movimento → accende entrambe le luci per 2 minuti (senza finestra oraria).
#
# - name: luci_su_movimento
#   on: motion_detected
#   do:
#     - device: luce_scrivania_1
#       action: turn_on
#       for: 2m
#     - device: luce_scrivania_2
#       action: turn_on
#       for: 2m
#   cooldown: 60s

# Regola di test: persona rilevata → accende entrambe le luci scrivania.
- name: test_luci_su_persona
  on: person_detected
  do:
    - device: luce_scrivania_1
      action: turn_on
    - device: luce_scrivania_2
      action: turn_on
  cooldown: 60s

# Aggiungere qui le proprie regole. Device disponibili:
#   luce_scrivania_1  — Alantop RGBCW, 192.168.1.179
#   luce_scrivania_2  — Alantop RGBCW, 192.168.1.101
