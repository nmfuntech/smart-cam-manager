<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLACKFRAME</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>
  <body>
    <main class="page redesigned">
      <section class="workspace">
        <aside class="status-rail settings-sidebar">
          <h2>Controlli</h2>
          <section class="sidebar-block motion-controls">
            <button
              class="ptz-overlay-toggle motion-overlay-toggle is-on"
              id="motion-overlay-toggle"
              type="button"
              aria-pressed="true"
            >
              MOTION ON
            </button>
            <p class="runtime-feedback" id="runtime-feedback">-</p>
            <div class="runtime-grid">
              <label class="runtime-field slider-field">
                <span>Sensibilita</span>
                <input id="cfg-motion-threshold" type="range" min="1" max="255" />
                <p class="slider-hint" id="cfg-motion-threshold-hint">Sensibilita media</p>
              </label>
              <label class="runtime-field slider-field">
                <span>Area minima</span>
                <input id="cfg-motion-min-area" type="range" min="1" max="30000" step="100" />
                <p class="slider-hint" id="cfg-motion-min-area-hint">Rileva anche movimenti piccoli</p>
              </label>
              <button class="ghost-button compact-button save-runtime" id="runtime-save" type="button">
                Salva
              </button>
            </div>
          </section>

          <section class="sidebar-block">
            <h2>Camera</h2>
            <div class="ptz-pad-simple sidebar-ptz">
              <button class="ptz-btn" data-direction="up" aria-label="Su">↑</button>
              <button class="ptz-btn" data-direction="left" aria-label="Sinistra">←</button>
              <button class="ptz-btn stop" data-action="stop" aria-label="Stop">Stop</button>
              <button class="ptz-btn" data-direction="right" aria-label="Destra">→</button>
              <button class="ptz-btn" data-direction="down" aria-label="Giù">↓</button>
            </div>
            <p class="ptz-message" id="ptz-message">-</p>
          </section>

          <section class="sidebar-block status-block">
            <h2>Stato</h2>
            <div class="status-stack">
              <span class="status-pill" id="stream-pill">Stream: verifica...</span>
              <span class="status-pill" id="motion-pill">Motion: verifica...</span>
              <span class="status-pill" id="ptz-pill">PTZ: verifica...</span>
            </div>
            <div class="status-card-grid">
              <div class="motion-stat">
                <span class="motion-label">Motion</span>
                <strong id="motion-state">-</strong>
              </div>
              <div class="motion-stat">
                <span class="motion-label">Ultimo evento</span>
                <strong id="motion-last-event">-</strong>
              </div>
              <div class="motion-stat">
                <span class="motion-label">Area live</span>
                <strong id="motion-current-area">0</strong>
              </div>
              <div class="motion-stat">
                <span class="motion-label">Ultimo trigger</span>
                <strong id="motion-last-trigger-area">0</strong>
              </div>
              <div class="motion-stat">
                <span class="motion-label">Soglia</span>
                <strong id="motion-threshold">-</strong>
              </div>
              <div class="motion-stat">
                <span class="motion-label">PTZ</span>
                <strong id="ptz-status-label">-</strong>
              </div>
              <div class="motion-stat">
                <span class="motion-label">Nodo</span>
                <strong id="ptz-host-label">-</strong>
              </div>
            </div>
          </section>
        </aside>

        <div class="main-column">
          <div class="viewer-shell">
            <div class="viewer-topbar compact">
              <h1>BLACKFRAME</h1>
              <a class="ghost-button" href="/health" target="_blank">Health</a>
            </div>

            <div class="viewer-frame">
              <img
                id="camera-frame"
                src="{{ url_for('video.snapshot') }}"
                alt="Streaming live BLACKFRAME"
              />
              <div class="viewer-overlay" id="viewer-overlay">
                Connessione in corso...
              </div>
            </div>
          </div>

          <section class="motion-shell compact-shell">
            <div class="motion-workspace">
              <div class="motion-preview-panel">
                <div class="motion-capture-copy">
                  <span class="motion-label">Preview</span>
                  <strong id="motion-capture-path">Nessun evento</strong>
                </div>
                <div class="motion-capture-frame">
                  <img id="motion-capture-image" alt="Preview evento di movimento" />
                  <p class="motion-capture-empty" id="motion-capture-empty">
                    Nessuna cattura
                  </p>
                </div>
              </div>

              <div class="capture-panel">
                <div class="capture-panel-head">
                  <strong id="capture-summary">Ultimi 5 eventi</strong>
                  <button class="ghost-button compact-button" id="capture-toggle" type="button">
                    Mostra altri
                  </button>
                </div>
                <div class="capture-list" id="capture-list"></div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="{{ url_for('static', filename='js/main.js') }}"
    ></script>
  </body>
</html>
